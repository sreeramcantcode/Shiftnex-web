<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#000"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="60" height="60" fill="url(#grid)"/>
  <text x="50%" y="50%" font-family="sans-serif" font-size="5" fill="#fff" text-anchor="middle" dominant-baseline="middle">S</text>
  <text x="50%" y="45" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">60×60</text>
</svg>